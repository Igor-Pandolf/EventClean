name: Build and deploy of EventCleanApi v1

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build project and Run Tests
        run: mvn clean package

      - name: Store Artifact
        uses: actions/upload-artifact@v7
        with:
          name: myapp-jar
          path: target/*.jar

      - name: Copy JAR to AWS EC2 via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/EventClean-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 1 # Isso evita que ele crie a pasta 'target/' dentro da EC2, jogando o JAR direto no /home/ec2-user/